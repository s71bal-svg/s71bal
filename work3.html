<!DOCTYPE html>

  <style>
    :root,[data-theme="light"]{--bg:#f2f4ef;--surface:#fcfcf8;--surface-2:#e8efe6;--border:#d7e0d4;--text:#1f221d;--muted:#647064;--faint:#8ca08e;--primary:#4f6b57;--primary-soft:#dfe8df;--accent:#7ea58a;--accent-soft:#ebf2eb;--shadow:0 18px 50px oklch(0.2 0.01 80 / .10);--shadow-lg:0 30px 70px oklch(0.2 0.01 80 / .14);--display:'Cormorant Garamond',Georgia,serif;--body:'Inter','Helvetica Neue',sans-serif}
    [data-theme="dark"]{--bg:#171c18;--surface:#202622;--surface-2:#27302a;--border:#354038;--text:#eef2ea;--muted:#bcc6bc;--faint:#859487;--primary:#96ba9f;--primary-soft:#24322a;--accent:#c0d2c2;--accent-soft:#223028;--shadow:0 18px 50px oklch(0 0 0 / .30);--shadow-lg:0 30px 70px oklch(0 0 0 / .40)}
    *{box-sizing:border-box} html{-webkit-text-size-adjust:none;text-size-adjust:none}
    body{margin:0;min-height:100dvh;font-family:var(--body);color:var(--text);background:radial-gradient(circle at top,color-mix(in oklab,var(--primary) 10%,transparent),transparent 28%),linear-gradient(180deg,#f7faf6 0%,var(--bg) 100%);line-height:1.6}

    .page{width:min(100% - 1.5rem,72rem);margin:0 auto;padding:max(1.5rem, env(safe-area-inset-top)) 0 4rem}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1.2rem}
    .brand{display:flex;align-items:center;gap:.75rem}.logo{width:2.9rem;height:2.9rem;border-radius:50%;display:grid;place-items:center;color:var(--primary);background:color-mix(in oklab,var(--primary) 10%,var(--surface));border:1px solid color-mix(in oklab,var(--primary) 18%,var(--border));box-shadow:0 1px 2px oklch(0.2 0.01 80 / .05)}
    .brand-copy small{display:block;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)} .brand-copy strong{display:block;font-size:.95rem;font-weight:600}
    .theme-btn{min-width:2.9rem;min-height:2.9rem;border:1px solid color-mix(in oklab,var(--text) 10%,transparent);border-radius:9999px;background:color-mix(in oklab,var(--surface) 86%,transparent);cursor:pointer;backdrop-filter:blur(14px)}
    .site-nav{display:flex;flex-wrap:wrap;gap:.75rem;margin:1rem 0 1.5rem;padding:.85rem 1rem;border-radius:1.25rem;background:color-mix(in oklab,var(--surface) 88%,transparent);border:1px solid color-mix(in oklab,var(--text) 8%,transparent)}
    .site-nav a{display:inline-flex;align-items:center;min-height:2.4rem;padding:0 .9rem;border-radius:9999px;background:color-mix(in oklab,var(--surface-2) 70%,transparent);border:1px solid color-mix(in oklab,var(--text) 6%,transparent);font-size:.92rem;font-weight:600;color:var(--text)}
    .site-nav a:hover{background:var(--primary-soft);color:var(--primary)}
    .section{margin-top:1rem;background:color-mix(in oklab,var(--surface) 92%,transparent);border:1px solid color-mix(in oklab,var(--text) 8%,transparent);box-shadow:var(--shadow);border-radius:2rem;padding:clamp(1.5rem,4vw,3rem)}
    .title{margin:0 0 .5rem;font-family:var(--display);font-size:clamp(2rem,4vw,3.6rem);line-height:.95;letter-spacing:-.05em;font-weight:600}
    .lead{margin:0;color:var(--muted);max-width:62ch}
    .work-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;margin-top:1.25rem}
    .work-card{overflow:hidden;border-radius:1.5rem;background:color-mix(in oklab,var(--surface-2) 76%,transparent);border:1px solid color-mix(in oklab,var(--text) 6%,transparent);box-shadow:var(--shadow)}
    .work-card .image{aspect-ratio:4/3;overflow:hidden;background:#dfe8df}
    .work-card img{width:100%;height:100%;object-fit:cover;display:block}
    .work-card .body{padding:1rem}
    .work-card h2{margin:0 0 .35rem;font-size:1.2rem}
    .work-card p{margin:0;color:var(--muted);font-size:.95rem}
    .btn-row{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:2.75rem;padding:0 1rem;border-radius:9999px;border:1px solid color-mix(in oklab,var(--text) 10%,transparent);background:color-mix(in oklab,var(--surface) 78%,transparent);font-weight:700}
    .btn-primary{background:var(--primary);color:#f7fbf8;border-color:transparent}
    .page-footer{margin-top:2rem;text-align:center;color:var(--faint);font-size:.75rem}
    @media (max-width:800px){.work-grid{grid-template-columns:1fr}}
</style>
</head>

    <main>
      <section class="section">
        <h1 class="title">作品名その3</h1>
        <p class="lead">紙の質感とやさしい色面を活かした、落ち着いた構成の作品です。</p>
        <div class="work-grid">

          <article class="work-card"><div class="image"><img src="./images/31.jpg" alt="作品名その3 2" /></div><div class="body"><h2>制作メモ</h2><p>動物のしぐさや輪郭をやわらかく見せるために、余白と色の重なりを大切にしています。</p></div></article>
        </div>
        <div class="btn-row"><a class="btn" href="./work2.html">前のページ</a><a class="btn btn-primary" href="./index.html">トップへ戻る</a><a class="btn" href="./work4.html">次のページ</a></div>

    </main>
    <footer class="page-footer">minto. / animal works</footer>
  </div>
  <script>const root=document.documentElement,themeToggle=document.getElementById('themeToggle');let theme=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';root.setAttribute('data-theme',theme);themeToggle.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';root.setAttribute('data-theme',theme);});</script>
