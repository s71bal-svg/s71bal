<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f6f2" />
  <meta name="description" content="洗練されたデザインのポモドーロタイマー。集中と休憩を静かに整える、スマホ向けPWAプロトタイプ。" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Pomodoro" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>pomodoro-timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --color-bg: #f7f6f2;
      --color-surface: #fbfaf7;
      --color-surface-2: #f1ede7;
      --color-surface-offset: #ece7df;
      --color-border: #d8d1c8;
      --color-divider: #dfd8cf;
      --color-text: #24211c;
      --color-text-muted: #6f6b65;
      --color-text-faint: #a7a39d;
      --color-text-inverse: #fbfaf7;
      --color-primary: #8c3b2d;
      --color-primary-hover: #6f2e23;
      --color-primary-soft: #ead5ce;
      --color-rest: #4c6b61;
      --color-rest-soft: #d6e0db;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 10px 30px oklch(0.2 0.01 80 / 0.10);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #161412;
      --color-surface: #1c1917;
      --color-surface-2: #24211e;
      --color-surface-offset: #2d2925;
      --color-border: #3a342f;
      --color-divider: #2d2926;
      --color-text: #ece7e1;
      --color-text-muted: #b7b1aa;
      --color-text-faint: #7d7771;
      --color-text-inverse: #161412;
      --color-primary: #d78c7d;
      --color-primary-hover: #e6a293;
      --color-primary-soft: #412a25;
      --color-rest: #92b2a7;
      --color-rest-soft: #24332d;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.18);
      --shadow-md: 0 10px 30px oklch(0 0 0 / 0.35);
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background:
        radial-gradient(circle at top, color-mix(in oklab, var(--color-primary) 8%, transparent), transparent 30%),
        var(--color-bg);
      line-height: 1.5;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      width: min(100%, 30rem);
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(var(--space-6), env(safe-area-inset-top)) var(--space-5) max(var(--space-6), env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: var(--space-6);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .logo {
      width: 2.5rem;
      height: 2.5rem;
      color: var(--color-primary);
      background: color-mix(in oklab, var(--color-primary) 10%, var(--color-surface));
      border: 1px solid color-mix(in oklab, var(--color-primary) 18%, var(--color-border));
      border-radius: 50%;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-sm);
      flex: none;
    }
    .brand-label small {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .brand-label strong {
      display: block;
      font-weight: 600;
      font-size: var(--text-sm);
    }
    .ghost-btn, .theme-btn {
      min-width: 2.75rem;
      min-height: 2.75rem;
      border-radius: var(--radius-full);
      border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
      background: color-mix(in oklab, var(--color-surface) 88%, transparent);
      color: var(--color-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
      backdrop-filter: blur(14px);
    }
    .hero-card {
      background: color-mix(in oklab, var(--color-surface) 92%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
      border-radius: 1.75rem;
      padding: var(--space-5);
      box-shadow: var(--shadow-md);
      display: grid;
      gap: var(--space-5);
    }
    .mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
    }
    .mode-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0.5rem 0.875rem;
      border-radius: var(--radius-full);
      background: var(--color-primary-soft);
      color: var(--color-primary);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .progress-copy {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .timer-wrap {
      display: grid;
      place-items: center;
      padding: var(--space-2) 0;
    }
    .ring {
      --progress: 0;
      width: min(76vw, 19rem);
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--accent-color) calc(var(--progress) * 1%), color-mix(in oklab, var(--color-text) 9%, transparent) 0);
      display: grid;
      place-items: center;
      position: relative;
      transition: background 400ms linear;
    }
    .ring::before {
      content: "";
      position: absolute;
      inset: 0.8rem;
      border-radius: 50%;
      background: linear-gradient(180deg, color-mix(in oklab, var(--color-surface) 95%, transparent), var(--color-bg));
      box-shadow: inset 0 1px 0 color-mix(in oklab, white 70%, transparent);
    }
    .timer-content {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      gap: var(--space-2);
      text-align: center;
    }
    .timer-content small {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .time {
      font-family: var(--font-display);
      font-size: clamp(4rem, 14vw, 5.8rem);
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
    }
    .subtitle {
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      max-width: 24ch;
      margin: 0 auto;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: var(--space-3);
    }
    .primary-btn {
      min-height: 3.5rem;
      border: none;
      border-radius: var(--radius-full);
      background: var(--accent-color);
      color: var(--color-text-inverse);
      padding: 0 var(--space-5);
      font-weight: 700;
      box-shadow: 0 8px 22px color-mix(in oklab, var(--accent-color) 30%, transparent);
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
    }
    .stat {
      background: color-mix(in oklab, var(--color-surface) 88%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
      border-radius: 1.25rem;
      padding: var(--space-4);
    }
    .stat span {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }
    .stat strong {
      font-size: var(--text-lg);
      font-variant-numeric: tabular-nums;
    }
    .panel {
      background: color-mix(in oklab, var(--color-surface) 86%, transparent);
      border: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
      border-radius: 1.5rem;
      padding: var(--space-5);
      display: grid;
      gap: var(--space-4);
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--space-3);
    }
    .panel h2 {
      margin: 0;
      font-size: var(--text-lg);
    }
    .panel p {
      margin: 0;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }
    .settings-grid {
      display: grid;
      gap: var(--space-4);
    }
    .field {
      display: grid;
      gap: var(--space-2);
    }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
    }
    .field label {
      font-size: var(--text-sm);
      font-weight: 600;
    }
    .field output {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-variant-numeric: tabular-nums;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent-color);
    }
    .footer-note {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      padding-bottom: var(--space-2);
    }
    .hidden { display: none !important; }
    .resting { --accent-color: var(--color-rest); }
    .focusing { --accent-color: var(--color-primary); }
    .theme-btn:hover, .ghost-btn:hover, .primary-btn:hover { transform: translateY(-1px); }
    .ghost-btn:active, .theme-btn:active, .primary-btn:active { transform: translateY(0); }
    :focus-visible {
      outline: 2px solid var(--accent-color);
      outline-offset: 3px;
    }
    @media (min-width: 720px) {
      .app { width: min(100%, 62rem); grid-template-columns: 1.15fr 0.85fr; grid-template-rows: auto 1fr auto; align-items: start; }
      .topbar { grid-column: 1 / -1; }
      .hero-card { min-height: 100%; }
      .side-stack { display: grid; gap: var(--space-4); }
      .footer-note { grid-column: 1 / -1; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app focusing" id="appRoot">
    <header class="topbar">
      <div class="brand" aria-label="Pomodoro Timer">
        <div class="logo">
          <svg viewBox="0 0 48 48" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M24 10c6.6 0 12 5 12 12.8C36 33.5 30.7 39 24 39S12 33.5 12 22.8C12 15 17.4 10 24 10Z"></path>
            <path d="M24 10c0-3.5 2.7-6 6.4-6 1.7 0 3 .4 4.6 1.5-2.4.5-4.4 2.2-5.4 4.5"></path>
            <path d="M19 22c1.5-2.8 4.5-4.6 8-4.6"></path>
          </svg>
        </div>
        <div class="brand-label">
          <small>Focus Ritual</small>
          <strong>Pomodoro Timer</strong>
        </div>
      </div>
      <button class="theme-btn" type="button" id="themeToggle" aria-label="テーマを切り替える">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <main class="hero-card" aria-live="polite">
      <div class="mode-row">
        <div class="mode-pill" id="modeLabel">Focus Session</div>
        <div class="progress-copy"><span id="cycleCount">0</span> / <span id="cycleGoal">4</span> completed</div>
      </div>

      <div class="timer-wrap">
        <div class="ring" id="progressRing" role="img" aria-label="タイマー進捗">
          <div class="timer-content">
            <small id="sessionLabel">集中する時間</small>
            <div class="time" id="timeDisplay">25:00</div>
          </div>
        </div>
      </div>

      <p class="subtitle" id="subtitle">今はひとつの作業だけに集中する時間です。終わると短い休憩に切り替わります。</p>

      <div class="controls">
        <button class="primary-btn" type="button" id="startPauseBtn">Start</button>
        <button class="ghost-btn" type="button" id="skipBtn" aria-label="現在のセッションをスキップ">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5v14l11-7-11-7Z"></path><path d="M19 5v14"></path></svg>
        </button>
        <button class="ghost-btn" type="button" id="resetBtn" aria-label="タイマーをリセット">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v5h5"></path></svg>
        </button>
      </div>

      <section class="stats" aria-label="本日の統計">
        <article class="stat">
          <span>Today</span>
          <strong id="todayCompleted">0</strong>
        </article>
        <article class="stat">
          <span>Focus min</span>
          <strong id="todayMinutes">0</strong>
        </article>
        <article class="stat">
          <span>Streak</span>
          <strong id="streakValue">1</strong>
        </article>
      </section>
    </main>

    <aside class="side-stack">
      <section class="panel" aria-labelledby="settingsTitle">
        <div class="panel-head">
          <div>
            <h2 id="settingsTitle">Settings</h2>
            <p>自分のリズムに合わせて静かに調整できます。</p>
          </div>
        </div>
        <div class="settings-grid">
          <div class="field">
            <div class="field-row">
              <label for="focusRange">集中時間</label>
              <output id="focusValue" for="focusRange">25分</output>
            </div>
            <input id="focusRange" type="range" min="15" max="60" step="5" value="25" />
          </div>
          <div class="field">
            <div class="field-row">
              <label for="shortBreakRange">短い休憩</label>
              <output id="shortBreakValue" for="shortBreakRange">5分</output>
            </div>
            <input id="shortBreakRange" type="range" min="3" max="15" step="1" value="5" />
          </div>
          <div class="field">
            <div class="field-row">
              <label for="longBreakRange">長い休憩</label>
              <output id="longBreakValue" for="longBreakRange">15分</output>
            </div>
            <input id="longBreakRange" type="range" min="10" max="30" step="5" value="15" />
          </div>
          <div class="field">
            <div class="field-row">
              <label for="cycleRange">長休憩までの回数</label>
              <output id="cycleValue" for="cycleRange">4回</output>
            </div>
            <input id="cycleRange" type="range" min="2" max="6" step="1" value="4" />
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="ritualTitle">
        <div class="panel-head">
          <div>
            <h2 id="ritualTitle">Flow</h2>
            <p>集中と休憩を交互に回し、4セットごとに深く休みます。</p>
          </div>
        </div>
        <p id="nextSessionCopy">次は短い休憩です。</p>
        <p id="notificationState">通知は未許可です。開始時に確認します。</p>
      </section>
    </aside>

    <div class="footer-note">ホーム画面に追加すれば、スマホでアプリのように使えます。</div>
  </div>

  <script>
    const root = document.documentElement;
    const appRoot = document.getElementById('appRoot');
    const timeDisplay = document.getElementById('timeDisplay');
    const modeLabel = document.getElementById('modeLabel');
    const sessionLabel = document.getElementById('sessionLabel');
    const subtitle = document.getElementById('subtitle');
    const nextSessionCopy = document.getElementById('nextSessionCopy');
    const notificationState = document.getElementById('notificationState');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const skipBtn = document.getElementById('skipBtn');
    const progressRing = document.getElementById('progressRing');
    const todayCompleted = document.getElementById('todayCompleted');
    const todayMinutes = document.getElementById('todayMinutes');
    const streakValue = document.getElementById('streakValue');
    const cycleCount = document.getElementById('cycleCount');
    const cycleGoal = document.getElementById('cycleGoal');
    const themeToggle = document.getElementById('themeToggle');

    const ranges = {
      focus: document.getElementById('focusRange'),
      shortBreak: document.getElementById('shortBreakRange'),
      longBreak: document.getElementById('longBreakRange'),
      cyclesUntilLong: document.getElementById('cycleRange')
    };

    const outputs = {
      focus: document.getElementById('focusValue'),
      shortBreak: document.getElementById('shortBreakValue'),
      longBreak: document.getElementById('longBreakValue'),
      cyclesUntilLong: document.getElementById('cycleValue')
    };

    let settings = {
      focus: 25,
      shortBreak: 5,
      longBreak: 15,
      cyclesUntilLong: 4
    };

    let state = {
      mode: 'focus',
      isRunning: false,
      remaining: settings.focus * 60,
      total: settings.focus * 60,
      completedCycles: 0,
      todayCount: 0,
      todayMinutes: 0,
      streak: 1,
      timerId: null,
      theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
    };

    root.setAttribute('data-theme', state.theme);

    const modeMap = {
      focus: {
        pill: 'Focus Session',
        label: '集中する時間',
        subtitle: '今はひとつの作業だけに集中する時間です。終わると短い休憩に切り替わります。'
      },
      shortBreak: {
        pill: 'Short Break',
        label: '少しだけ休む時間',
        subtitle: '体を軽くほぐして、視線を遠くに向けると戻りやすくなります。'
      },
      longBreak: {
        pill: 'Long Break',
        label: '深く休む時間',
        subtitle: 'ここまでの集中を区切って、次のセットのためにしっかり休みます。'
      }
    };

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60).toString().padStart(2, '0');
      const sec = (seconds % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }

    function updateOutputs() {
      outputs.focus.textContent = `${settings.focus}分`;
      outputs.shortBreak.textContent = `${settings.shortBreak}分`;
      outputs.longBreak.textContent = `${settings.longBreak}分`;
      outputs.cyclesUntilLong.textContent = `${settings.cyclesUntilLong}回`;
      cycleGoal.textContent = settings.cyclesUntilLong;
    }

    function getDurationForMode(mode) {
      if (mode === 'focus') return settings.focus * 60;
      if (mode === 'shortBreak') return settings.shortBreak * 60;
      return settings.longBreak * 60;
    }

    function getNextMode() {
      if (state.mode === 'focus') {
        return (state.completedCycles > 0 && state.completedCycles % settings.cyclesUntilLong === 0) ? 'longBreak' : 'shortBreak';
      }
      return 'focus';
    }

    function updateNextCopy() {
      const next = getNextMode();
      nextSessionCopy.textContent = next === 'focus' ? '次は集中セッションです。' : next === 'shortBreak' ? '次は短い休憩です。' : '次は長い休憩です。';
    }

    function render() {
      const current = modeMap[state.mode];
      modeLabel.textContent = current.pill;
      sessionLabel.textContent = current.label;
      subtitle.textContent = current.subtitle;
      timeDisplay.textContent = formatTime(state.remaining);
      startPauseBtn.textContent = state.isRunning ? 'Pause' : (state.remaining === state.total ? 'Start' : 'Resume');
      todayCompleted.textContent = state.todayCount;
      todayMinutes.textContent = state.todayMinutes;
      streakValue.textContent = state.streak;
      cycleCount.textContent = state.completedCycles % settings.cyclesUntilLong;
      const progress = ((state.total - state.remaining) / state.total) * 100;
      progressRing.style.setProperty('--progress', String(Math.max(0, Math.min(100, progress))));
      appRoot.classList.toggle('resting', state.mode !== 'focus');
      appRoot.classList.toggle('focusing', state.mode === 'focus');
      updateNextCopy();
    }

    function switchMode(mode) {
      state.mode = mode;
      state.total = getDurationForMode(mode);
      state.remaining = state.total;
      render();
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      state.isRunning = false;
      render();
    }

    async function ensureNotificationPermission() {
      if (!('Notification' in window)) {
        notificationState.textContent = 'このブラウザでは通知に対応していません。';
        return 'unsupported';
      }
      if (Notification.permission === 'granted') {
        notificationState.textContent = '通知は許可されています。';
        return 'granted';
      }
      if (Notification.permission === 'denied') {
        notificationState.textContent = '通知は拒否されています。ブラウザ設定で変更できます。';
        return 'denied';
      }
      const permission = await Notification.requestPermission();
      notificationState.textContent = permission === 'granted' ? '通知は許可されています。' : '通知はオフのままです。';
      return permission;
    }

    function notifySessionEnd() {
      if ('Notification' in window && Notification.permission === 'granted') {
        const body = state.mode === 'focus' ? '集中時間が終わりました。少し休みましょう。' : '休憩が終わりました。次の集中に戻れます。';
        new Notification('Pomodoro Timer', { body });
      }
    }

    function completeSession() {
      const finishedMode = state.mode;
      if (finishedMode === 'focus') {
        state.completedCycles += 1;
        state.todayCount += 1;
        state.todayMinutes += settings.focus;
      }
      notifySessionEnd();
      switchMode(getNextMode());
      if (state.isRunning) startTimer();
    }

    function startTimer() {
      stopTimer();
      state.isRunning = true;
      state.timerId = setInterval(() => {
        state.remaining -= 1;
        if (state.remaining <= 0) {
          completeSession();
        }
        render();
      }, 1000);
      render();
    }

    startPauseBtn.addEventListener('click', async () => {
      if (!state.isRunning && state.remaining === state.total) {
        await ensureNotificationPermission();
      }
      if (state.isRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener('click', () => {
      stopTimer();
      state.remaining = state.total;
      render();
    });

    skipBtn.addEventListener('click', () => {
      completeSession();
    });

    Object.entries(ranges).forEach(([key, input]) => {
      input.addEventListener('input', () => {
        settings[key] = Number(input.value);
        updateOutputs();
        if (!state.isRunning) {
          state.total = getDurationForMode(state.mode);
          state.remaining = state.total;
        }
        render();
      });
    });

    themeToggle.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', state.theme);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    updateOutputs();
    render();
  </script>
</body>
</html>
