<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools | minto.</title>

  <style>
    :root {
      --bg: #0f1013;
      --card: rgba(24, 26, 31, 0.78);
      --border: rgba(255, 255, 255, 0.10);
      --text: #f5f1ea;
      --muted: #b7b0a6;
      --primary: #e2c79a;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      --danger-bg: #442222;
      --danger-text: #ff6666;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(226, 199, 154, 0.10), transparent 30%),
        linear-gradient(180deg, #12131a 0%, #0f1013 100%);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    img { max-width: 100%; display: block; }

    .page {
      width: min(100% - 1rem, 72rem);
      margin: 0 auto;
      padding: 1rem 0 3rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 1.1rem;
    }

    .nav {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin: 1rem 0 1.25rem;
      padding: 0.85rem 0.9rem;
      border-radius: 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav a {
      padding: 0.55rem 0.9rem;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .nav a:hover {
      background: rgba(226, 199, 154, 0.10);
      color: var(--primary);
    }

    .shell {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 1.6rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 1.5rem;
    }

    .section-title {
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .section-copy {
      margin: 0.5rem 0 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      padding: 0 1.25rem;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .btn-primary {
      background: linear-gradient(180deg, #ead2a8, #d7b47c);
      color: #1a140d;
      border: 0;
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #f0ddb8, #e0bf88);
    }

    /* 極小の天気・タイマー・ツールカード */
    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .mini-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    /* 天気 (極小) */
    .weather-min {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .weather-min h2 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .weather-min select {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 6px;
    }

    .weather-min select:focus {
      outline: none;
      border-color: #667eea;
    }

    .weather-info-min {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .weather-icon-min {
      width: 32px;
      height: 32px;
    }

    .weather-details-min {
      font-size: 12px;
      color: #aaa;
    }

    .weather-details-min div {
      margin: 2px 0;
    }

    .loading { opacity: 0.7; }

    .error-min {
      background: var(--danger-bg);
      color: var(--danger-text);
      padding: 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .current-city-min {
      color: #667eea;
      font-size: 11px;
      margin-top: 4px;
    }

    /* ポモドーロタイマー (極小) */
    .timer-min {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .timer-min h2 {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .timer-display-min {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .timer-value-min {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #ead2a8, #d7b47c);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .timer-label-min {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .timer-progress-min {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 9999px;
      overflow: hidden;
    }

    .timer-progress-bar-min {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ead2a8, #d7b47c);
      border-radius: 9999px;
      transition: width 0.1s linear;
    }

    .timer-controls-min {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .timer-btn-min {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }

    .timer-btn-min:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .timer-btn-min.active {
      background: linear-gradient(180deg, #ead2a8, #d7b47c);
      color: #1a140d;
      border: 0;
    }

    /* ツールカード (極小) */
    .tools-min {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tool-card-min {
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .tool-card-min:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(226, 199, 154, 0.2);
    }

    .tool-card-min.active {
      border-color: var(--primary);
      background: rgba(226, 199, 154, 0.15);
    }

    /* 注目のデモ (フルサイズ) */
    .featured-full {
      margin-top: 0;
      border-radius: 1.6rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: #111;
      height: calc(100vh - 280px);
      min-height: 500px;
    }

    .featured-full iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #111;
    }

    .featured-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .featured-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .featured-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .codepen-actions-full {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .footer {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
      .mini-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 0.75rem, 72rem); }
      .card { padding: 1.25rem; }
      .nav { gap: 0.5rem; }
      .nav a { font-size: 0.85rem; padding: 0.5rem 0.75rem; }
      .featured-full { height: calc(100vh - 360px); min-height: 400px; }
      .topbar { flex-direction: column; gap: 0.75rem; }
      .btn { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">minto. tools</div>
      <a class="btn" href="/minto/index.html">← Back to Home</a>
    </header>

    <nav class="nav" aria-label="site nav">
      <a href="/minto/index.html">Home</a>
      <a href="/minto/pomodoro-timer.html">Pomodoro</a>
      <a href="/minto/tools/index.html">Tools</a>
      <a href="/minto/index.html#gallery">Gallery</a>
      <a href="/minto/index.html#contact">Contact</a>
    </nav>

    <main class="shell">
      <!-- 極小の天気・タイマー・ツール -->
      <div class="mini-grid">
        <!-- 天気 (極小) -->
        <div class="mini-card weather-min">
          <h2>🌤️ 天気</h2>
          <select id="city-select">
            <option value="tokyo">東京</option>
            <option value="osaka">大阪</option>
            <option value="nagoya">名古屋</option>
            <option value="sapporo">札幌</option>
            <option value="fukuoka">福岡</option>
            <option value="sendai">仙台</option>
            <option value="hiroshima">広島</option>
            <option value="kobe">神戸</option>
            <option value="kyoto">京都</option>
            <option value="nara">奈良</option>
            <option value="yokohama">横浜</option>
            <option value="chiba">千葉</option>
            <option value="saitama">埼玉</option>
            <option value="current">📍 現在地</option>
          </select>
          <div id="weather-info-min" class="weather-info-min loading">
            <span>取得...</span>
          </div>
          <div id="current-city-min" class="current-city-min"></div>
        </div>

        <!-- ポモドーロタイマー (極小) -->
        <div class="mini-card timer-min">
          <h2>⏱️ Timer</h2>
          <div class="timer-display-min">
            <div class="timer-value-min" id="timerDisplay">25:00</div>
            <div class="timer-label-min" id="timerLabel">Work Time</div>
            <div class="timer-progress-min">
              <div class="timer-progress-bar-min" id="timerProgressBar"></div>
            </div>
          </div>
          <div class="timer-controls-min">
            <button class="timer-btn-min" id="startBtn">▶</button>
            <button class="timer-btn-min" id="pauseBtn">⏸</button>
            <button class="timer-btn-min" id="resetBtn">↻</button>
          </div>
        </div>

        <!-- ツールカード (極小) -->
        <div class="mini-card">
          <div class="tools-min" id="tools-min">
            <div class="tool-card-min active" data-src="https://codepen.io/s71bal/full/MYbGJbM">Color</div>
            <div class="tool-card-min" data-src="https://codepen.io/s71bal/full/bNBMwbP">Demo2</div>
            <div class="tool-card-min" data-src="https://codepen.io/s71bal/full/MYbGKoJ">Demo3</div>
            <div class="tool-card-min" data-src="https://codepen.io/s71bal/full/azBGvBd">Demo4</div>
            <div class="tool-card-min" data-src="https://codepen.io/s71bal/full/xbRjGXo">Demo5</div>
          </div>
        </div>
      </div>

      <!-- 注目のデモ (フルサイズ) -->
      <section class="card">
        <div class="featured-header">
          <h2>📺 Featured Demo</h2>
          <p>ツールカードをクリックして遊んでください</p>
        </div>

        <div class="featured-full">
          <iframe
            id="featuredIframe"
            src="https://codepen.io/s71bal/full/MYbGJbM"
            loading="lazy"
            allowfullscreen
            title="Featured Tool"
          ></iframe>
        </div>

        <div class="codepen-actions-full">
          <a class="btn btn-primary" id="openInCodePen" href="https://codepen.io/s71bal/full/MYbGJbM" target="_blank" rel="noopener noreferrer">Open in CodePen</a>
          <a class="btn" href="https://codepen.io/s71bal" target="_blank" rel="noopener noreferrer">View All on CodePen</a>
        </div>
      </section>
    </main>

    <div class="footer">minto. / Tools Playground</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ========== ポモドーロタイマー (極小) ==========
      let totalSeconds = 25 * 60;
      let remainingSeconds = totalSeconds;
      let isRunning = false;
      let timerId = null;

      const timerDisplay = document.getElementById('timerDisplay');
      const timerLabel = document.getElementById('timerLabel');
      const timerProgressBar = document.getElementById('timerProgressBar');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      function updateDisplay() {
        timerDisplay.textContent = formatTime(remainingSeconds);
        const progress = ((totalSeconds - remainingSeconds) / totalSeconds) * 100;
        timerProgressBar.style.width = `${progress}%`;
      }

      function playNotification() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          oscillator.frequency.value = 800;
          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {}
      }

      function startTimer() {
        if (isRunning) return;
        isRunning = true;
        startBtn.classList.add('active');
        timerId = setInterval(() => {
          if (remainingSeconds > 0) {
            remainingSeconds--;
            updateDisplay();
          } else {
            clearInterval(timerId);
            isRunning = false;
            startBtn.classList.remove('active');
            playNotification();
            document.title = '完了！ | minto.';
          }
        }, 1000);
      }

      function pauseTimer() {
        if (!isRunning) return;
        clearInterval(timerId);
        isRunning = false;
        startBtn.classList.remove('active');
      }

      function resetTimer() {
        clearInterval(timerId);
        isRunning = false;
        remainingSeconds = totalSeconds;
        updateDisplay();
        startBtn.classList.remove('active');
        document.title = 'Tools | minto.';
      }

      startBtn.addEventListener('click', startTimer);
      pauseBtn.addEventListener('click', pauseTimer);
      resetBtn.addEventListener('click', resetTimer);

      // ========== 天気 (極小) ==========
      const apiKey = 'e850556215e5cf0214c8333b3bbc436e';
      const cities = {
        tokyo: { lat: 35.6895, lon: 139.6917, name: '東京' },
        osaka: { lat: 34.6937, lon: 135.5023, name: '大阪' },
        nagoya: { lat: 34.9885, lon: 136.9066, name: '名古屋' },
        sapporo: { lat: 43.0642, lon: 141.3469, name: '札幌' },
        fukuoka: { lat: 35.6852, lon: 130.4017, name: '福岡' },
        sendai: { lat: 38.2682, lon: 140.8694, name: '仙台' },
        hiroshima: { lat: 34.3853, lon: 132.4553, name: '広島' },
        kobe: { lat: 34.6913, lon: 135.1910, name: '神戸' },
        kyoto: { lat: 35.0116, lon: 135.7682, name: '京都' },
        nara: { lat: 34.6851, lon: 135.8050, name: '奈良' },
        yokohama: { lat: 35.4437, lon: 139.6380, name: '横浜' },
        chiba: { lat: 35.6074, lon: 140.1065, name: '千葉' },
        saitama: { lat: 35.8569, lon: 139.6506, name: '埼玉' }
      };

      function setWeatherLoading(text) {
        const weatherInfo = document.getElementById('weather-info-min');
        weatherInfo.classList.add('loading');
        weatherInfo.innerHTML = `<span>${text}</span>`;
      }

      function getWeather(lat, lon, cityName = '') {
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=ja&appid=${apiKey}`;
        const weatherInfo = document.getElementById('weather-info-min');
        setWeatherLoading('取得...');

        fetch(url)
          .then(res => res.json())
          .then(data => {
            if (data.cod === '401' || data.cod === '403') throw new Error('API キー無効');
            const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
            weatherInfo.classList.remove('loading');
            weatherInfo.innerHTML = `
              <img src="${iconUrl}" alt="天気" class="weather-icon-min">
              <div class="weather-details-min">
                <div>${data.weather[0].description}</div>
                <div>${data.main.temp}°C</div>
              </div>
            `;
            document.getElementById('current-city-min').textContent = cityName ? `📍 ${cityName}` : '';
          })
          .catch(err => {
            weatherInfo.classList.remove('loading');
            weatherInfo.innerHTML = `
              <div class="error-min">
                ❌ 取得失敗
              </div>
            `;
            document.getElementById('current-city-min').textContent = '';
          });
      }

      document.getElementById('city-select').addEventListener('change', function () {
        const selectedCity = this.value;
        if (selectedCity === 'current') {
          if (!navigator.geolocation) {
            setWeatherLoading('NG');
            return;
          }
          setWeatherLoading('取得...');
          document.getElementById('current-city-min').textContent = '';
          navigator.geolocation.getCurrentPosition(
            position => getWeather(position.coords.latitude, position.coords.longitude, '現在地'),
            () => setWeatherLoading('NG')
          );
        } else {
          const city = cities[selectedCity];
          getWeather(city.lat, city.lon, city.name);
        }
      });

      // ========== ツールカードクリックで iframe 表示変更 ==========
      const toolCards = document.querySelectorAll('.tool-card-min');
      const featuredIframe = document.getElementById('featuredIframe');
      const openInCodePen = document.getElementById('openInCodePen');

      function selectTool(src) {
        featuredIframe.src = src;
        openInCodePen.href = src;
        
        toolCards.forEach(card => card.classList.remove('active'));
        document.querySelector(`.tool-card-min[data-src="${src}"]`)?.classList.add('active');
      }

      toolCards.forEach(card => {
        const src = card.getAttribute('data-src');
        if (src) {
          card.addEventListener('click', () => selectTool(src));
        }
      });

      // 初期表示
      updateDisplay();
      getWeather(cities.tokyo.lat, cities.tokyo.lon, cities.tokyo.name);
    });
  </script>
</body>
</html>
